name: Release

on:
  push:
    tags:
    - '*'

defaults:
  run:
    shell: bash

env:
  RUSTFLAGS: --deny warnings

jobs:
  prerelease:
    runs-on: ubuntu-latest

    outputs:
      value: ${{ steps.prerelease.outputs.value }}

    steps:
    - name: Prerelease Check
      id: prerelease
      run: |
        if [[ ${{ github.ref_name }} =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
          echo value=false >> "$GITHUB_OUTPUT"
        else
          echo value=true >> "$GITHUB_OUTPUT"
        fi

  package:
    strategy:
      matrix:
        target:
        - aarch64-apple-darwin
        - aarch64-unknown-linux-musl
        - arm-unknown-linux-musleabihf
        - armv7-unknown-linux-musleabihf
        - x86_64-apple-darwin
        - x86_64-pc-windows-gnu
        - x86_64-unknown-linux-musl
        include:
        - target: aarch64-apple-darwin
          os: macos-latest
          target_rustflags: ''
        - target: aarch64-unknown-linux-musl
          os: ubuntu-latest
          target_rustflags: '--codegen linker=aarch64-linux-gnu-gcc'
        - target: arm-unknown-linux-musleabihf
          os: ubuntu-latest
          target_rustflags: '--codegen linker=arm-linux-gnueabihf-gcc'
        - target: armv7-unknown-linux-musleabihf
          os: ubuntu-latest
          target_rustflags: '--codegen linker=arm-linux-gnueabihf-gcc'
        - target: x86_64-apple-darwin
          os: macos-15-intel
          target_rustflags: ''
        - target: x86_64-pc-windows-gnu
          os: windows-latest
        - target: x86_64-unknown-linux-musl
          os: ubuntu-latest
          target_rustflags: ''

    runs-on: ${{matrix.os}}

    needs: prerelease

    steps:
    - uses: actions/checkout@v4

    - name: Remove Broken WSL bash executable
      if: ${{ matrix.os == 'windows-latest' }}
      shell: cmd
      run: |
        takeown /F C:\Windows\System32\bash.exe
        icacls C:\Windows\System32\bash.exe /grant administrators:F
        del C:\Windows\System32\bash.exe

    - name: Install AArch64 Toolchain
      if: ${{ matrix.target == 'aarch64-unknown-linux-musl' }}
      run: |
        sudo apt-get update
        sudo apt-get install gcc-aarch64-linux-gnu libc6-dev-i386

    - name: Install musl tools
      if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl' || matrix.target == 'arm-unknown-linux-musleabihf' || matrix.target == 'armv7-unknown-linux-musleabihf' }}
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools

    - name: Install ARM Toolchain
      if: ${{ matrix.target == 'arm-unknown-linux-musleabihf' || matrix.target == 'armv7-unknown-linux-musleabihf' }}
      run: |
        sudo apt-get update
        sudo apt-get install gcc-arm-linux-gnueabihf

    - uses: msys2/setup-msys2@v2
      if: ${{ matrix.target == 'x86_64-pc-windows-gnu' }}
      with:
        install: diffutils m4 make mingw-w64-x86_64-gcc
        msystem: MINGW64
        path-type: inherit
        update: true

    - name: Configure compiler for musl targets
      if: ${{ contains(matrix.target, 'musl') }}
      run: |
        if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
          {
            echo "CC=gcc"
            echo "CC_x86_64_unknown_linux_musl=gcc"
            echo "CFLAGS=-D_FORTIFY_SOURCE=0 -O2"
          } >> "$GITHUB_ENV"
        elif [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
          {
            echo "CC=aarch64-linux-gnu-gcc"
            echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc"
            echo "CFLAGS=-D_FORTIFY_SOURCE=0 -O2"
          } >> "$GITHUB_ENV"
        elif [[ "${{ matrix.target }}" == "arm-unknown-linux-musleabihf" ]]; then
          {
            echo "CC=arm-linux-gnueabihf-gcc"
            echo "CC_arm_unknown_linux_musleabihf=arm-linux-gnueabihf-gcc"
            echo "CFLAGS=-D_FORTIFY_SOURCE=0 -O2"
          } >> "$GITHUB_ENV"
        elif [[ "${{ matrix.target }}" == "armv7-unknown-linux-musleabihf" ]]; then
          {
            echo "CC=arm-linux-gnueabihf-gcc"
            echo "CC_armv7_unknown_linux_musleabihf=arm-linux-gnueabihf-gcc"
            echo "CFLAGS=-D_FORTIFY_SOURCE=0 -O2"
          } >> "$GITHUB_ENV"
        fi

    - name: Package
      id: package
      if: ${{ matrix.os != 'windows-latest' }}
      env:
        TARGET: ${{ matrix.target }}
        REF: ${{ github.ref }}
        OS: ${{ matrix.os }}
        TARGET_RUSTFLAGS: ${{ matrix.target_rustflags }}
      run: ./bin/package
      shell: bash

    - name: Package
      id: package_windows
      if: ${{ matrix.os == 'windows-latest' }}
      env:
        TARGET: ${{ matrix.target }}
        REF: ${{ github.ref }}
        OS: ${{ matrix.os }}
        TARGET_RUSTFLAGS: ${{ matrix.target_rustflags }}
      run: ./bin/package
      shell: msys2 {0}

    - name: Extract Release Notes
      if: ${{ startsWith(github.ref, 'refs/tags/') }}
      run: |
        awk -v ver="${{ github.ref_name }}" '
          $0 ~ "^## \\["ver"\\]" { flag=1; next }
          flag && /^## \[/ { exit }
          flag { print }
        ' CHANGELOG.md > RELEASE_NOTES.md

    - name: Publish Archive
      uses: softprops/action-gh-release@v2.2.1
      if: ${{ startsWith(github.ref, 'refs/tags/') }}
      with:
        draft: false
        files: ${{ steps.package.outputs.archive || steps.package_windows.outputs.archive }}
        body_path: RELEASE_NOTES.md
        prerelease: ${{ needs.prerelease.outputs.value }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  checksum:
    runs-on: ubuntu-latest

    needs:
    - package
    - prerelease

    steps:
    - name: Download Release Archives
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: >-
        gh release download
        --repo terror/val
        --pattern '*'
        --dir release
        ${{ github.ref_name }}

    - name: Create Checksums
      run: |
        cd release
        shasum -a 256 ./* > ../SHA256SUMS

    - name: Publish Checksums
      uses: softprops/action-gh-release@v2.2.1
      with:
        draft: false
        files: SHA256SUMS
        prerelease: ${{ needs.prerelease.outputs.value }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
